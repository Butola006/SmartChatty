<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" width="32" height="32" preserveAspectRatio="xMidYMid meet">
  <!-- Chat bubble background - emerald green like the app -->
  <rect width="100" height="100" rx="24" fill="#10b981"/>
  
  <!-- Chat bubbles with messages -->
  <g opacity="0.95">
    <!-- First message bubble (left) -->
    <rect x="14" y="22" width="38" height="28" rx="7" fill="white" opacity="0.3"/>
    <line x1="20" y1="32" x2="46" y2="32" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <line x1="20" y1="41" x2="38" y2="41" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Second message bubble (right) -->
    <rect x="48" y="52" width="38" height="28" rx="7" fill="white" opacity="0.5"/>
    <line x1="54" y1="62" x2="78" y2="62" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="54" y1="71" x2="72" y2="71" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>